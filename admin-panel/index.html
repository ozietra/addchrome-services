<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Kill any leftover/rogue service worker registered on this origin (e.g. a
    // previous app that ran on localhost:3000). Such a worker intercepts API
    // requests and serves stale/empty responses on a normal refresh (only a hard
    // reload bypasses it).
    (function () {
      if (!('serviceWorker' in navigator)) return;
      navigator.serviceWorker.getRegistrations().then(function (rs) {
        var had = rs.length > 0;
        rs.forEach(function (r) { r.unregister(); });
        var clearCaches = (window.caches && caches.keys)
          ? caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); })
          : Promise.resolve();
        clearCaches.catch(function () {}).then(function () {
          if ((had || navigator.serviceWorker.controller) && !sessionStorage.getItem('sw_killed')) {
            sessionStorage.setItem('sw_killed', '1');
            location.reload();
          }
        });
      }).catch(function () {});
    })();
  </script>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Yönetim Paneli — Giriş</title>
  <link rel="stylesheet" href="css/admin.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="url(#admin-grad)"/>
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs><linearGradient id="admin-grad" x1="0" y1="24" x2="24" y2="0"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
        </svg>
        <h1>Yönetim Paneli</h1>
        <p>Chrome Eklentileri Kontrol Merkezi</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="loginEmail">E-posta</label>
          <div class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="loginEmail" placeholder="admin@admin.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="loginPassword">Şifre</label>
          <div class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPassword" placeholder="Şifrenizi girin" required>
          </div>
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn-login">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span>Giriş Yap</span>
        </button>
      </form>
    </div>
  </div>
  <script src="js/api.js?v=2"></script>
  <script src="js/auth.js?v=2"></script>
</body>
</html>
