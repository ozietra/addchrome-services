<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Unfollow AI</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="url(#uf-grad)"/>
          <path d="M8 12h8M12 8v8" stroke="white" stroke-width="2" stroke-linecap="round" transform="rotate(45 12 12)"/>
          <defs>
            <linearGradient id="uf-grad" x1="0" y1="24" x2="24" y2="0">
              <stop stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="header-title" data-i18n="extensionName">Instagram Takipten Çıkarma AI</span>
      </div>
      <div class="header-right">
        <button id="btnLang" class="btn-icon" title="Dil Değiştir">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <button id="btnSettings" class="btn-icon" title="Ayarlar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Auth Screen -->
    <section id="authScreen" class="screen active">
      <div class="auth-card">
        <div class="auth-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/>
          </svg>
        </div>
        <h2 id="authTitle" data-i18n="loginTitle">Hesabınıza Giriş Yapın</h2>
        <form id="authForm" class="auth-form">
          <div id="nameField" class="form-group hidden">
            <label data-i18n="name">Ad Soyad</label>
            <input type="text" id="inputName" placeholder="Ad Soyad">
          </div>
          <div class="form-group">
            <label data-i18n="email">E-posta</label>
            <input type="email" id="inputEmail" placeholder="ornek@email.com" required>
          </div>
          <div class="form-group">
            <label data-i18n="password">Şifre</label>
            <input type="password" id="inputPassword" placeholder="******" required minlength="6">
          </div>
          <div id="authError" class="error-msg hidden"></div>
          <button type="submit" id="btnAuth" class="btn-primary">
            <span data-i18n="login">Giriş Yap</span>
          </button>
        </form>
        <p class="auth-switch">
          <span id="switchText" data-i18n="noAccount">Hesabınız yok mu?</span>
          <a href="#" id="switchAuth" data-i18n="register">Kayıt Ol</a>
        </p>
      </div>
    </section>

    <!-- Not on Instagram -->
    <section id="notInstagramScreen" class="screen">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--color-muted)" stroke-width="1.5">
          <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/>
        </svg>
        <h3 data-i18n="openInstagram">Lütfen Instagram'ı açın</h3>
        <p data-i18n="openInstagramDesc">Bu eklenti yalnızca instagram.com üzerinde çalışır.</p>
        <a href="https://www.instagram.com" target="_blank" class="btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          <span>Instagram'ı Aç</span>
        </a>
      </div>
    </section>

    <!-- Main Screen -->
    <section id="mainScreen" class="screen">
      <!-- Stats Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statFollowers">-</div>
          <div class="stat-label" data-i18n="statsFollowers">Takipçi</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statFollowing">-</div>
          <div class="stat-label" data-i18n="statsFollowing">Takip</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-value" id="statNonFollowers">-</div>
          <div class="stat-label" data-i18n="statsNonFollowers">Takip Etmeyen</div>
        </div>
      </div>

      <!-- Scan Button -->
      <button id="btnScan" class="btn-scan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span data-i18n="scan">Tara</span>
      </button>

      <!-- Progress -->
      <div id="progressSection" class="progress-section hidden">
        <div class="progress-info">
          <span id="progressLabel" data-i18n="scanning">Taranıyor...</span>
          <span id="progressCount">0 / 0</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <!-- Tabs -->
      <div id="tabsSection" class="tabs-section hidden">
        <div class="tabs">
          <button class="tab active" data-tab="nonfollowers">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
              <line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/>
            </svg>
            <span data-i18n="nonFollowers">Takip Etmeyenler</span>
          </button>
          <button class="tab" data-tab="whitelist">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span data-i18n="whitelist">Beyaz Liste</span>
          </button>
        </div>

        <!-- Speed Control -->
        <div class="speed-control">
          <label data-i18n="speedLabel">Hız Ayarı</label>
          <div class="speed-options">
            <button class="speed-btn active" data-speed="slow">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              <span data-i18n="speedSlow">Yavaş</span>
            </button>
            <button class="speed-btn" data-speed="balanced">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              <span data-i18n="speedBalanced">Dengeli</span>
            </button>
            <button class="speed-btn locked" data-speed="fast">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
              <span data-i18n="speedFast">Hızlı</span>
            </button>
          </div>
        </div>

        <!-- Actions -->
        <div class="actions-bar">
          <button id="btnSelectAll" class="btn-action">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <span data-i18n="selectAll">Tümünü Seç</span>
          </button>
          <button id="btnUnfollowSelected" class="btn-unfollow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
              <line x1="23" y1="11" x2="17" y2="11"/>
            </svg>
            <span data-i18n="unfollowSelected">Seçilenleri Çıkar</span>
          </button>
        </div>

        <!-- User List -->
        <div id="userList" class="user-list"></div>
      </div>

      <!-- Premium Prompt -->
      <div id="premiumPrompt" class="premium-prompt hidden">
        <div class="premium-card">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-premium)" stroke-width="1.5">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <h3 data-i18n="premiumRequired">Premium Gerekli</h3>
          <p data-i18n="premiumDesc">Bu özellik premium üyelik gerektirir.</p>
          <button id="btnUpgrade" class="btn-premium" data-i18n="upgradePremium">Premium'a Yükselt</button>
        </div>
      </div>
    </section>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 data-i18n="settings">Ayarlar</h3>
          <button id="closeSettings" class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-item">
            <label data-i18n="language">Dil</label>
            <select id="langSelect" class="select">
              <option value="tr">Türkçe</option>
              <option value="en">English</option>
            </select>
          </div>
          <button id="btnLogout" class="btn-danger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span data-i18n="logout">Çıkış Yap</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/logger.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="../shared/api-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
