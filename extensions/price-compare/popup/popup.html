<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiyat Karşılaştır</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect width="24" height="24" rx="6" fill="url(#pc-grad)"/>
          <path d="M7 14l3-8 4 5 3-3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="pc-grad" x1="0" y1="24" x2="24" y2="0">
              <stop stop-color="#10b981"/><stop offset="1" stop-color="#059669"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="header-title" data-i18n="extensionName">Fiyat Karşılaştır</span>
      </div>
      <div class="header-right">
        <button id="btnLang" class="btn-icon" title="Dil Değiştir">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <button id="btnSettings" class="btn-icon" title="Ayarlar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Auth Screen -->
    <section id="authScreen" class="screen active">
      <div class="auth-card">
        <div class="auth-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8l4 4-4 4"/>
          </svg>
        </div>
        <h2 id="authTitle" data-i18n="loginTitle">Hesabınıza Giriş Yapın</h2>
        <form id="authForm" class="auth-form">
          <div id="nameField" class="form-group hidden">
            <label data-i18n="name">Ad Soyad</label>
            <input type="text" id="inputName" placeholder="Ad Soyad">
          </div>
          <div class="form-group">
            <label data-i18n="email">E-posta</label>
            <input type="email" id="inputEmail" placeholder="ornek@email.com" required>
          </div>
          <div class="form-group">
            <label data-i18n="password">Şifre</label>
            <input type="password" id="inputPassword" placeholder="******" required minlength="6">
          </div>
          <div id="authError" class="error-msg hidden"></div>
          <button type="submit" id="btnAuth" class="btn-primary">
            <span data-i18n="login">Giriş Yap</span>
          </button>
        </form>
        <p class="auth-switch">
          <span id="switchText" data-i18n="noAccount">Hesabınız yok mu?</span>
          <a href="#" id="switchAuth" data-i18n="register">Kayıt Ol</a>
        </p>
      </div>
    </section>

    <!-- Main Screen -->
    <section id="mainScreen" class="screen">
      <!-- Search Bar -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Ürün adı yazın... (ör: iPhone 14)">
          <button id="btnClearSearch" class="btn btn-sm btn-icon" style="background:transparent; color:var(--text-3); padding:0; position:absolute; right:12px; border:none;" title="Temizle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <button id="btnSearch" class="btn-search" data-i18n="search">Ara</button>
      </div>

      <!-- Site Picker: user chooses which stores to compare -->
      <div id="sitePicker" class="site-picker" style="display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 4px;"></div>

      <!-- Loading -->
      <div id="loadingSection" class="loading-section hidden">
        <div class="loading-spinner"></div>
        <p data-i18n="searching">Aranıyor...</p>
      </div>

      <!-- Results -->
      <div id="resultsSection" class="results-section hidden">
        <div class="results-header">
          <span id="resultsInfo"></span>
          <select id="sortSelect" class="sort-select">
            <option value="low" data-i18n="sortLowToHigh">Fiyat: Düşükten Yükseğe</option>
            <option value="high" data-i18n="sortHighToLow">Fiyat: Yüksekten Düşüğe</option>
          </select>
        </div>
        <div id="resultsList" class="results-list"></div>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state hidden">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-muted)" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <p data-i18n="noResults">Sonuç bulunamadı</p>
      </div>

      <!-- Premium Prompt -->
      <div id="premiumPrompt" class="premium-prompt hidden">
        <div class="premium-card">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--color-premium)" stroke-width="1.5">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <h3 data-i18n="premiumRequired">Premium Gerekli</h3>
          <p data-i18n="premiumDesc">Bu özellik premium üyelik gerektirir.</p>
          <button id="btnUpgrade" class="btn-premium" data-i18n="upgradePremium">Premium'a Yükselt</button>
        </div>
      </div>
    </section>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3 data-i18n="settings">Ayarlar</h3>
          <button id="closeSettings" class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-item">
            <label data-i18n="language">Dil</label>
            <select id="langSelect" class="select">
              <option value="tr">Türkçe</option>
              <option value="en">English</option>
            </select>
          </div>
          <button id="btnLogout" class="btn-danger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span data-i18n="logout">Çıkış Yap</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/logger.js"></script>
  <script src="../shared/i18n.js"></script>
  <script src="../shared/api-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
